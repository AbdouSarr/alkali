name: Release & Update Homebrew

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          swift --version

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64 --disable-sandbox
          cp .build/apple/Products/Release/alkali alkali
          strip alkali
          tar czf alkali-macos.tar.gz alkali
          shasum -a 256 alkali-macos.tar.gz > alkali-macos.tar.gz.sha256

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            alkali-macos.tar.gz \
            alkali-macos.tar.gz.sha256

      - name: Get release metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TAG="${GITHUB_REF#refs/tags/}"
          SHA256=$(awk '{print $1}' alkali-macos.tar.gz.sha256)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: AbdouSarr/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA256: ${{ steps.meta.outputs.sha256 }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/alkali-macos.tar.gz"

          cat > homebrew-tap/Formula/alkali.rb << FORMULA
          class Alkali < Formula
            desc "Reactive bridge between Swift's compiler and your running UI"
            homepage "https://github.com/abdousarr/alkali"
            url "${URL}"
            sha256 "${SHA256}"
            license "MIT"
            version "${VERSION}"

            depends_on macos: :sonoma

            def install
              bin.install "alkali"
            end

            def caveats
              <<~EOS
                To configure Alkali with Claude Code, run:

                  alkali setup --global

                Or for a specific project:

                  cd /path/to/your/project
                  alkali setup

                This adds Alkali as an MCP server so Claude Code can query
                your SwiftUI views, assets, data flow, and project structure.
              EOS
            end

            test do
              assert_match "${VERSION}", shell_output("#{bin}/alkali --version")
            end
          end
          FORMULA

          # Fix indentation (remove leading spaces from heredoc)
          sed -i '' 's/^          //' homebrew-tap/Formula/alkali.rb

      - name: Commit and push formula
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/alkali.rb
          git commit -m "alkali ${{ steps.meta.outputs.version }}"
          git push
